
<style>
@keyframes orbitRing { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
@keyframes orbitRingR { 0%{transform:rotate(0deg)} 100%{transform:rotate(-360deg)} }
@keyframes nodeGlow { 0%,100%{opacity:0.5;r:6} 50%{opacity:1;r:9} }
@keyframes brainPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
@keyframes float3 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes float4 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
@keyframes scanLine { 0%{opacity:0;transform:translateY(-40px)} 50%{opacity:0.6} 100%{opacity:0;transform:translateY(40px)} }
@keyframes typing { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes waveBar1 { 0%,100%{height:8px} 50%{height:28px} }
@keyframes waveBar2 { 0%,100%{height:14px} 50%{height:36px} }
@keyframes waveBar3 { 0%,100%{height:22px} 50%{height:10px} }
@keyframes particleDrift { 0%{transform:translate(0,0);opacity:0.8} 100%{transform:translate(12px,-30px);opacity:0} }
@keyframes connectLine { 0%{stroke-dashoffset:100} 100%{stroke-dashoffset:0} }
@keyframes badgePop { 0%{transform:scale(0.8)} 50%{transform:scale(1.05)} 100%{transform:scale(1)} }
@keyframes glimmer { 0%,100%{opacity:0.15} 50%{opacity:0.5} }
</style>
<svg width="100%" viewBox="0 0 520 400" xmlns="http://www.w3.org/2000/svg" role="img">
<title>InterviewAI Command Center Hero Illustration</title>
<desc>A central AI brain orbited by interview tools and metrics, surrounded by person profiles and achievement nodes</desc>

<defs>
  <linearGradient id="bgL" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#020617"/>
    <stop offset="100%" stop-color="#0c0a1e"/>
  </linearGradient>
  <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.4"/>
    <stop offset="50%" stop-color="#6366f1" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
  </radialGradient>
  <filter id="blur8"><feGaussianBlur stdDeviation="8"/></filter>
  <filter id="blur3"><feGaussianBlur stdDeviation="3"/></filter>
</defs>

<!-- BG -->
<rect width="520" height="400" fill="url(#bgL)" rx="20"/>

<!-- Grid -->
<g opacity="0.07">
  <line x1="0" y1="40" x2="520" y2="40" stroke="#38bdf8" stroke-width="0.5"/>
  <line x1="0" y1="80" x2="520" y2="80" stroke="#38bdf8" stroke-width="0.5"/>
  <line x1="0" y1="120" x2="520" y2="120" stroke="#38bdf8" stroke-width="0.5"/>
  <line x1="0" y1="160" x2="520" y2="160" stroke="#38bdf8" stroke-width="0.5"/>
  <line x1="0" y1="200" x2="520" y2="200" stroke="#38bdf8" stroke-width="0.5"/>
  <line x1="0" y1="240" x2="520" y2="240" stroke="#38bdf8" stroke-width="0.5"/>
  <line x1="0" y1="280" x2="520" y2="280" stroke="#38bdf8" stroke-width="0.5"/>
  <line x1="0" y1="320" x2="520" y2="320" stroke="#38bdf8" stroke-width="0.5"/>
  <line x1="0" y1="360" x2="520" y2="360" stroke="#38bdf8" stroke-width="0.5"/>
  <line x1="60" y1="0" x2="60" y2="400" stroke="#38bdf8" stroke-width="0.5"/>
  <line x1="120" y1="0" x2="120" y2="400" stroke="#38bdf8" stroke-width="0.5"/>
  <line x1="180" y1="0" x2="180" y2="400" stroke="#38bdf8" stroke-width="0.5"/>
  <line x1="240" y1="0" x2="240" y2="400" stroke="#38bdf8" stroke-width="0.5"/>
  <line x1="300" y1="0" x2="300" y2="400" stroke="#38bdf8" stroke-width="0.5"/>
  <line x1="360" y1="0" x2="360" y2="400" stroke="#38bdf8" stroke-width="0.5"/>
  <line x1="420" y1="0" x2="420" y2="400" stroke="#38bdf8" stroke-width="0.5"/>
  <line x1="480" y1="0" x2="480" y2="400" stroke="#38bdf8" stroke-width="0.5"/>
</g>

<!-- Central glow -->
<ellipse cx="260" cy="196" rx="120" ry="110" fill="url(#coreGlow)" filter="url(#blur8)"/>

<!-- Outer orbit ring 1 -->
<g style="transform-origin:260px 196px; animation:orbitRing 18s linear infinite">
  <ellipse cx="260" cy="196" rx="148" ry="80" fill="none" stroke="#38bdf8" stroke-width="0.8" stroke-dasharray="4,8" opacity="0.3"/>
  <!-- Orbiting dot 1 -->
  <circle cx="408" cy="196" r="5" fill="#38bdf8" style="animation:nodeGlow 2s ease-in-out infinite"/>
</g>

<!-- Outer orbit ring 2 -->
<g style="transform-origin:260px 196px; animation:orbitRingR 24s linear infinite">
  <ellipse cx="260" cy="196" rx="110" ry="56" fill="none" stroke="#a78bfa" stroke-width="0.8" stroke-dasharray="3,10" opacity="0.25"/>
  <circle cx="370" cy="196" r="4" fill="#a78bfa"/>
</g>

<!-- Connection lines from center to modules -->
<line x1="260" y1="196" x2="82" y2="196" stroke="#38bdf8" stroke-width="0.8" stroke-dasharray="100" opacity="0.3" style="animation:connectLine 2s ease-out forwards"/>
<line x1="260" y1="196" x2="438" y2="196" stroke="#38bdf8" stroke-width="0.8" stroke-dasharray="100" opacity="0.3" style="animation:connectLine 2s ease-out 0.3s forwards"/>
<line x1="260" y1="196" x2="150" y2="68" stroke="#a78bfa" stroke-width="0.8" stroke-dasharray="100" opacity="0.25" style="animation:connectLine 2s ease-out 0.5s forwards"/>
<line x1="260" y1="196" x2="370" y2="68" stroke="#a78bfa" stroke-width="0.8" stroke-dasharray="100" opacity="0.25" style="animation:connectLine 2s ease-out 0.7s forwards"/>
<line x1="260" y1="196" x2="150" y2="326" stroke="#fbbf24" stroke-width="0.8" stroke-dasharray="100" opacity="0.2" style="animation:connectLine 2s ease-out 0.9s forwards"/>
<line x1="260" y1="196" x2="370" y2="326" stroke="#fbbf24" stroke-width="0.8" stroke-dasharray="100" opacity="0.2" style="animation:connectLine 2s ease-out 1.1s forwards"/>

<!-- ── CENTRAL AI BRAIN ── -->
<g style="transform-origin:260px 196px; animation:brainPulse 3s ease-in-out infinite">
  <!-- Outer ring decoration -->
  <circle cx="260" cy="196" r="70" fill="none" stroke="#38bdf8" stroke-width="1" stroke-dasharray="6,4" opacity="0.4"/>
  <circle cx="260" cy="196" r="62" fill="#0c1a2e" stroke="#1e3a5f" stroke-width="2"/>
  <!-- Inner hex-like shape -->
  <polygon points="260,140 307,168 307,224 260,252 213,224 213,168" fill="#0a1628" stroke="#38bdf8" stroke-width="1.5" opacity="0.8"/>
  <!-- AI text / core -->
  <circle cx="260" cy="196" r="36" fill="#0ea5e9" opacity="0.1"/>
  <circle cx="260" cy="196" r="36" fill="none" stroke="#38bdf8" stroke-width="1"/>
  <!-- AI icon face -->
  <rect x="242" y="178" width="36" height="36" rx="8" fill="#0c1a2e" stroke="#38bdf8" stroke-width="1.5"/>
  <!-- Eye indicators -->
  <circle cx="253" cy="191" r="5" fill="#38bdf8" opacity="0.9" style="animation:nodeGlow 1.5s ease-in-out infinite"/>
  <circle cx="267" cy="191" r="5" fill="#38bdf8" opacity="0.9" style="animation:nodeGlow 1.5s ease-in-out 0.75s infinite"/>
  <!-- Mouth bar -->
  <rect x="249" y="202" width="20" height="4" rx="2" fill="#38bdf8" opacity="0.7"/>
  <rect x="249" y="202" width="12" height="4" rx="2" fill="#38bdf8"/>
  <!-- Scan line -->
  <rect x="242" y="186" width="36" height="2" fill="#38bdf8" opacity="0.4" style="animation:scanLine 2s linear infinite"/>
  <!-- AI label -->
  <text x="260" y="226" text-anchor="middle" font-size="8" font-family="monospace" fill="#38bdf8" font-weight="700">INTERVIEW AI</text>
</g>

<!-- ── MODULE 1: Question Bank (left) ── -->
<g style="animation:float3 3.5s ease-in-out infinite; transform-origin:82px 196px">
  <rect x="28" y="158" width="108" height="76" rx="10" fill="#0c1a2e" stroke="#1e40af" stroke-width="1.5"/>
  <text x="82" y="178" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#60a5fa">Question Bank</text>
  <rect x="36" y="185" width="92" height="6" rx="3" fill="#1e3a5f"/>
  <rect x="36" y="185" width="78" height="6" rx="3" fill="#38bdf8" opacity="0.8"/>
  <rect x="36" y="198" width="92" height="6" rx="3" fill="#1e3a5f"/>
  <rect x="36" y="198" width="55" height="6" rx="3" fill="#38bdf8" opacity="0.6"/>
  <rect x="36" y="211" width="92" height="6" rx="3" fill="#1e3a5f"/>
  <rect x="36" y="211" width="68" height="6" rx="3" fill="#38bdf8" opacity="0.4"/>
  <text x="82" y="228" text-anchor="middle" font-size="8" font-family="sans-serif" fill="#94a3b8">500+ Questions</text>
</g>

<!-- ── MODULE 2: Live Analytics (right) ── -->
<g style="animation:float3 4s ease-in-out 0.8s infinite; transform-origin:438px 196px">
  <rect x="385" y="155" width="108" height="82" rx="10" fill="#0c1a2e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="439" y="174" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#4ade80">Live Score</text>
  <!-- Bar chart -->
  <g transform="translate(395,178)">
    <rect x="0" y="0" width="12" height="8" rx="2" fill="#334155" style="transform-origin:6px 8px"/>
    <rect x="0" y="0" width="12" height="28" rx="2" fill="#4ade80" style="transform-origin:6px 28px; animation:waveBar1 1.5s ease-in-out infinite"/>
    <rect x="18" y="0" width="12" height="14" rx="2" fill="#4ade80" style="transform-origin:6px 14px; animation:waveBar2 1.5s ease-in-out 0.3s infinite"/>
    <rect x="36" y="0" width="12" height="22" rx="2" fill="#4ade80" style="transform-origin:6px 22px; animation:waveBar3 1.5s ease-in-out 0.6s infinite"/>
    <rect x="54" y="0" width="12" height="18" rx="2" fill="#4ade80" style="transform-origin:6px 18px; animation:waveBar1 1.5s ease-in-out 0.9s infinite"/>
    <rect x="72" y="0" width="12" height="32" rx="2" fill="#fbbf24" style="transform-origin:6px 32px; animation:waveBar2 1.5s ease-in-out 1.2s infinite"/>
  </g>
  <text x="439" y="228" text-anchor="middle" font-size="8" font-family="sans-serif" fill="#94a3b8">Real-time Feedback</text>
</g>

<!-- ── MODULE 3: Role Picker (top-left) ── -->
<g style="animation:float4 3s ease-in-out 0.3s infinite; transform-origin:150px 68px">
  <rect x="90" y="34" width="120" height="68" rx="10" fill="#0c1a2e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="150" y="54" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#c4b5fd">Target Role</text>
  <rect x="100" y="62" width="100" height="14" rx="7" fill="#1e0a3c" stroke="#7c3aed" stroke-width="1"/>
  <text x="150" y="73" text-anchor="middle" font-size="8" font-family="sans-serif" fill="#a78bfa">Frontend Dev ▾</text>
  <rect x="100" y="82" width="100" height="14" rx="3" fill="#2e1065" opacity="0.5"/>
  <text x="150" y="93" text-anchor="middle" font-size="8" font-family="sans-serif" fill="#94a3b8">Backend / Full Stack</text>
</g>

<!-- ── MODULE 4: Mock Timer (top-right) ── -->
<g style="animation:float4 3.8s ease-in-out 1s infinite; transform-origin:370px 68px">
  <rect x="310" y="30" width="120" height="72" rx="10" fill="#0c1a2e" stroke="#f97316" stroke-width="1.5"/>
  <text x="370" y="50" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#fb923c">Mock Timer</text>
  <!-- Clock face -->
  <circle cx="370" cy="74" r="20" fill="#1c0f00" stroke="#f97316" stroke-width="1.5"/>
  <line x1="370" y1="74" x2="370" y2="59" stroke="#fb923c" stroke-width="2" stroke-linecap="round" style="transform-origin:370px 74px; animation:orbitRing 10s linear infinite"/>
  <line x1="370" y1="74" x2="381" y2="74" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" style="transform-origin:370px 74px; animation:orbitRing 60s linear infinite"/>
  <circle cx="370" cy="74" r="2" fill="#f97316"/>
  <text x="370" y="102" text-anchor="middle" font-size="7" font-family="monospace" fill="#fb923c">30:00 min</text>
</g>

<!-- ── MODULE 5: Achievment Badge (bottom-left) ── -->
<g style="animation:float3 4.5s ease-in-out 0.5s infinite; transform-origin:150px 326px">
  <rect x="90" y="296" width="120" height="58" rx="10" fill="#0c1a2e" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="150" y="315" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#fde68a">Achievement</text>
  <circle cx="116" cy="335" r="14" fill="#431407" stroke="#f97316" stroke-width="1.5"/>
  <text x="116" y="340" text-anchor="middle" font-size="16" font-family="sans-serif">🏆</text>
  <text x="155" y="330" font-size="8" font-family="sans-serif" fill="#94a3b8">Interview</text>
  <text x="155" y="342" font-size="9" font-family="sans-serif" fill="#4ade80" font-weight="700">Pro Badge</text>
  <text x="155" y="352" font-size="7" font-family="sans-serif" fill="#fbbf24">+250 XP</text>
</g>

<!-- ── MODULE 6: Progress (bottom-right) ── -->
<g style="animation:float4 3.2s ease-in-out 1.5s infinite; transform-origin:370px 326px">
  <rect x="310" y="294" width="120" height="60" rx="10" fill="#0c1a2e" stroke="#ec4899" stroke-width="1.5"/>
  <text x="370" y="313" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#f9a8d4">Your Progress</text>
  <circle cx="350" cy="334" r="14" fill="none" stroke="#334155" stroke-width="4"/>
  <circle cx="350" cy="334" r="14" fill="none" stroke="#ec4899" stroke-width="4"
    stroke-dasharray="70 88" stroke-linecap="round" transform="rotate(-90,350,334)"/>
  <text x="350" y="338" text-anchor="middle" font-size="8" font-family="sans-serif" fill="white" font-weight="700">79%</text>
  <text x="388" y="326" font-size="8" font-family="sans-serif" fill="#94a3b8">Skill score</text>
  <text x="388" y="340" font-size="9" font-family="sans-serif" fill="#f9a8d4" font-weight="700">Advanced</text>
  <text x="388" y="352" font-size="7" font-family="sans-serif" fill="#4ade80">↑ 12% this week</text>
</g>

<!-- Floating particles -->
<circle cx="200" cy="130" r="2.5" fill="#38bdf8" opacity="0.7" style="animation:particleDrift 2.5s ease-out infinite"/>
<circle cx="310" cy="110" r="2" fill="#a78bfa" opacity="0.6" style="animation:particleDrift 3s ease-out 0.5s infinite"/>
<circle cx="180" cy="270" r="2" fill="#fbbf24" opacity="0.5" style="animation:particleDrift 2s ease-out 1s infinite"/>
<circle cx="340" cy="280" r="2.5" fill="#4ade80" opacity="0.6" style="animation:particleDrift 2.8s ease-out 1.5s infinite"/>
<circle cx="160" cy="196" r="2" fill="#38bdf8" opacity="0.5" style="animation:particleDrift 3.5s ease-out 0.8s infinite"/>

<!-- Glimmering corner stars -->
<circle cx="34" cy="38" r="3" fill="#38bdf8" style="animation:nodeGlow 2.5s ease-in-out infinite"/>
<circle cx="486" cy="38" r="3" fill="#a78bfa" style="animation:nodeGlow 3s ease-in-out 1s infinite"/>
<circle cx="34" cy="362" r="3" fill="#fbbf24" style="animation:nodeGlow 2s ease-in-out 0.5s infinite"/>
<circle cx="486" cy="362" r="3" fill="#4ade80" style="animation:nodeGlow 3.5s ease-in-out 1.5s infinite"/>

<!-- Bottom title bar -->
<rect x="140" y="375" width="240" height="18" rx="9" fill="#0c1a2e" stroke="#1e3a5f" stroke-width="1"/>
<text x="260" y="388" text-anchor="middle" font-size="10" font-family="monospace" fill="#38bdf8">AI-Powered · Role-Tailored · Real-Time</text>
</svg>
